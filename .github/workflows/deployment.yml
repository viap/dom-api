name: Deployment
on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: dom-api-prod-deploy
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get the project code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Run e2e tests
        run: npm run test:e2e

  deploy:
    runs-on: ubuntu-latest
    environment: prod
    needs: test
    steps:
      - name: Get the project code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Make env file with secrets
        uses: SpicyPizza/create-envfile@v2.0
        with:
          directory: 'config/'
          fail_on_empty: true
          envkey_NODE_ENV: prod
          envkey_PORT: ${{secrets.PORT}}
          envkey_WEBSOCKET_PORT: ${{secrets.WEBSOCKET_PORT}}
          envkey_CORS_ORIGINS: ${{secrets.CORS_ORIGINS}}
          envkey_JWT_SECRET: ${{secrets.JWT_SECRET}}
          envkey_BOT_CLIENT_NAME: ${{secrets.BOT_CLIENT_NAME}}
          envkey_BOT_CLIENT_PASSWORD: ${{secrets.BOT_CLIENT_PASSWORD}}
          envkey_WEB_CLIENT_NAME: ${{secrets.WEB_CLIENT_NAME}}
          envkey_WEB_CLIENT_PASSWORD: ${{secrets.WEB_CLIENT_PASSWORD}}
          envkey_MONGO_URL: ${{secrets.MONGO_URL}}
          envkey_MONGO_DBNAME: ${{secrets.MONGO_DBNAME}}
          envkey_MONGO_INITDB_ROOT_USERNAME: ${{secrets.MONGO_INITDB_ROOT_USERNAME}}
          envkey_MONGO_INITDB_ROOT_PASSWORD: ${{secrets.MONGO_INITDB_ROOT_PASSWORD}}
      - name: Install dependencies
        run: npm ci
      - name: Build the project
        run: npm run build
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{secrets.SSH_PRIVATE_KEY}}
          ARGS: '-avzr --delete'
          REMOTE_HOST: ${{secrets.REMOTE_HOST}}
          REMOTE_USER: ${{secrets.REMOTE_USER}}
          TARGET: ${{secrets.REMOTE_TARGET}}
          EXCLUDE: '/.github/, /.git/, /.gitignore, /src/, /node_modules/, /test/, /coverage/, /uploads/'
          SCRIPT_BEFORE: |
            [ -n "${{secrets.REMOTE_TARGET}}" ] || { echo "REMOTE_TARGET secret is missing"; exit 1; }
            [ -n "${{secrets.REMOTE_UPLOADS_PATH}}" ] || { echo "REMOTE_UPLOADS_PATH secret is missing"; exit 1; }
            mkdir -p ${{secrets.REMOTE_TARGET}}
            if [ ! -d "${{secrets.REMOTE_UPLOADS_PATH}}" ]; then
              echo "Creating REMOTE_UPLOADS_PATH directory..."
              mkdir -p "${{secrets.REMOTE_UPLOADS_PATH}}"
            fi
            mkdir -p "${{secrets.REMOTE_UPLOADS_PATH}}/media" "${{secrets.REMOTE_UPLOADS_PATH}}/thumbnails"
            UPLOADS_LINK="${{secrets.REMOTE_TARGET}}/uploads"
            UPLOADS_TARGET="${{secrets.REMOTE_UPLOADS_PATH}}"
            if [ -L "$UPLOADS_LINK" ]; then
              CURRENT_TARGET="$(readlink -f "$UPLOADS_LINK")"
              EXPECTED_TARGET="$(readlink -f "$UPLOADS_TARGET")"
              [ "$CURRENT_TARGET" = "$EXPECTED_TARGET" ] || {
                echo "Existing uploads symlink points to unexpected location: $CURRENT_TARGET";
                exit 1;
              }
            elif [ -e "$UPLOADS_LINK" ]; then
              if [ -d "$UPLOADS_LINK" ] && [ -z "$(ls -A "$UPLOADS_LINK")" ]; then
                rmdir "$UPLOADS_LINK"
                ln -s "$UPLOADS_TARGET" "$UPLOADS_LINK"
              else
                echo "Refusing to replace non-empty ${UPLOADS_LINK}. Move/clean it manually, then re-run deploy."
                exit 1;
              fi
            else
              ln -s "$UPLOADS_TARGET" "$UPLOADS_LINK"
            fi
            echo "Creating backup of current deployment..."
            if [ -d "${{secrets.REMOTE_TARGET}}" ] && [ "$(ls -A ${{secrets.REMOTE_TARGET}})" ]; then
              BACKUP_DIR="${{secrets.REMOTE_TARGET}}_backup_$(date +%Y%m%d_%H%M%S)"
              cp -r ${{secrets.REMOTE_TARGET}} $BACKUP_DIR
              echo "Backup created at: $BACKUP_DIR"
              # Keep only the last 5 backups
              ls -dt ${{secrets.REMOTE_TARGET}}_backup_* 2>/dev/null | tail -n +6 | xargs -r rm -rf
            else
              echo "No existing deployment found, skipping backup"
            fi
      - name: Remote | Init and start the project
        uses: fifsky/ssh-action@v0.0.6
        with:
          command: |
            export PORT="${{secrets.PORT}}"
            export WEBSOCKET_PORT="${{secrets.WEBSOCKET_PORT}}"
            export CORS_ORIGINS="${{secrets.CORS_ORIGINS}}"
            export JWT_SECRET="${{secrets.JWT_SECRET}}"
            export BOT_CLIENT_NAME="${{secrets.BOT_CLIENT_NAME}}"
            export BOT_CLIENT_PASSWORD="${{secrets.BOT_CLIENT_PASSWORD}}"
            export WEB_CLIENT_NAME="${{secrets.WEB_CLIENT_NAME}}"
            export WEB_CLIENT_PASSWORD="${{secrets.WEB_CLIENT_PASSWORD}}"
            export MONGO_URL="${{secrets.MONGO_URL}}"
            export MONGO_DBNAME="${{secrets.MONGO_DBNAME}}"
            export MONGO_INITDB_ROOT_USERNAME="${{secrets.MONGO_INITDB_ROOT_USERNAME}}"
            export MONGO_INITDB_ROOT_PASSWORD="${{secrets.MONGO_INITDB_ROOT_PASSWORD}}"
            export REMOTE_TARGET="${{secrets.REMOTE_TARGET}}"
            export REMOTE_UPLOADS_PATH="${{secrets.REMOTE_UPLOADS_PATH}}"
            cd "${REMOTE_TARGET}"
            bash scripts/deploy/post_sync_start.sh
          host: ${{secrets.REMOTE_HOST}}
          user: ${{secrets.REMOTE_USER}}
          key: ${{secrets.SSH_PRIVATE_KEY}}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed at: $(date)"
          echo "Environment: production"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Failed at: $(date)"
          echo "Please check logs and consider rollback if necessary"
          echo "Manual rollback can be triggered with: gh workflow run deployment.yml"

      - name: Create deployment summary
        if: always()
        run: |
          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Deployment completed successfully**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
            echo "- Monitor application logs for any issues" >> $GITHUB_STEP_SUMMARY
            echo "- Verify application functionality manually if needed" >> $GITHUB_STEP_SUMMARY
            echo "- Check monitoring dashboards (if configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the workflow logs above for error details" >> $GITHUB_STEP_SUMMARY
            echo "2. Check server logs via SSH if needed" >> $GITHUB_STEP_SUMMARY
            echo "3. Consider running a manual rollback if necessary" >> $GITHUB_STEP_SUMMARY
            echo "4. Verify the build was successful in the test job" >> $GITHUB_STEP_SUMMARY
          fi

  rollback:
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ always() && needs.deploy.result == 'failure' }}
    needs: deploy
    steps:
      - name: Rollback to previous deployment
        uses: fifsky/ssh-action@v0.0.6
        with:
          command: |
            export PORT="${{secrets.PORT}}"
            export REMOTE_TARGET="${{secrets.REMOTE_TARGET}}"
            export REMOTE_UPLOADS_PATH="${{secrets.REMOTE_UPLOADS_PATH}}"
            bash "${REMOTE_TARGET}/scripts/deploy/rollback.sh"
          host: ${{secrets.REMOTE_HOST}}
          user: ${{secrets.REMOTE_USER}}
          key: ${{secrets.SSH_PRIVATE_KEY}}
